<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滑石きたむら動物病院</title>
    <meta name="description" content="滑石きたむら動物病院は大切な家族のホームドクターです">
    <meta name="keywords" content="animal, hospital, 病院">
    <link rel="shortcut icon" href="./img/favicon.svg" type="image/x-icon">
    <!-- 必須タグ -->
    <!-- og:title : 表示させるページタイトルを指定 -->
    <meta property="og:title" content="滑石きたむら動物病院">
    <!-- og:type : website/blog/article/videoなどページの種類を指定 -->
    <meta property="og:type" content="website">
    <!-- og:image : サムネイルとして表示させる画像URLを絶対パスとして指定 -->
    <meta property="og:image" content="./img/fv_pc.jpg">
    <!-- og:url : ページのURLを絶対パスで指定 -->
    <meta property="og:url" content="">

    <!-- 任意タグ -->
    <!-- og:description : ページの説明文を指定 -->
    <meta property="og:description" content="">
    <!-- og:site_name : サイト名を指定 -->
    <meta property="og:site_name" content="Zunbea portfolio">
    <!-- og:locale : サポートしている言語を指定 -->
    <meta property="og:locale" content="japanese">
    <!-- twitter:card : 表示カードの種類を指定 -->
    <meta name="twitter:card" content="Summary with Large Image">
    <!-- twitter:site : ツイッターのアカウント名を「@アカウント名」の形式で指定 -->
    <meta name="twitter:site" content="@Zunbea_study">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <div class="container">
      <!-- header -->
      <header class="header">
        <div class="inner">
          <div class="header__logo">
            <a href="#">
              <div class="icon">
                <img src="./img/ashiato_01.jpg" alt="滑石きたむら動物病院">
              </div>
              <h1 class="header__logo-title">滑石きたむら動物病院</h1>
            </a>
          </div>
          <nav class="header__nav pc">
            <ul class="header__nav-list">
              <li class="header__nav-item">
                <a href="#greeting">ご挨拶</a>
              </li>
              <li class="header__nav-item">
                <a href="#strings">強み</a>
              </li>
              <li class="header__nav-item">
                <a href="#service">サービス</a>
              </li>
              <li class="header__nav-item">
                <a href="#news">お知らせ</a>
              </li>
              <li class="header__nav-item">
                <a href="#access">アクセス</a>
              </li>
              <li class="header__nav-item">
                <a href="#contact">お問い合わせ</a>
              </li>
            </ul>
          </nav>
        </div>
      </header>

      <!-- main -->
      <main class="main">

        <!-- fv -->
        <div class="fv">
          <div class="fv__img">
            <picture>
              <source media="(min-width: 768px)" srcset="/img/fv_pc.jpg">
              <img src="./img/fv_sp.jpg" alt="滑石きたむら動物病院は大切な家族のホームドクターです">
            </picture>
          </div>
          <div class="fv__contents">
            <div class="fv__contents-textarea">
              <p class="fv__text">滑石きたむら動物病院は</p>
              <h2 class="fv__title">
                <span class="fv__title-main">大切な家族の</span>
                <span class="fv__title-sub">ホームドクターです</span>
              </h2>
            </div>
          </div>
        </div>

        <!-- ご挨拶 -->
        <section id="greeting" class="greeting">
          <div class="greeting__catch">
            <h2>動物たちの健康で<br class="sp">幸せな生活をサポート</h2>
            <p class="greeting__text">
              当院は地域に密着し、皆さまの大切な家族の一員である動物たちのホームドクターを目指しています。<br>
              緊急時だけではなく、日常のちょっとした不安や違和感などお気軽にご相談ください。<br>
              動物たちが健康で幸せな生活を送ることができるようサポートいたします。
            </p>
          </div>
          <div class="greeting__image">
            <img src="./img/ashiato_02.svg" alt="動物たちの健康で幸せな生活をサポート">
          </div>
        </section>
      </main>

      <!-- footer -->
      <footer class="footer"></footer>
    </div>
  </body>
</html>
